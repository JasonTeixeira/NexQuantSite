---
# Primary Database Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: nexural-production
  labels:
    app: postgres-primary
    role: primary
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: postgres-primary
    role: primary

---
# Read Replica Load Balancer Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-read-replica
  namespace: nexural-production
  labels:
    app: postgres-replica
    role: replica
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: postgres-replica
    role: replica

---
# Headless Services for StatefulSets
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary-headless
  namespace: nexural-production
spec:
  clusterIP: None
  selector:
    app: postgres-primary
    role: primary
  ports:
  - port: 5432
    targetPort: 5432

