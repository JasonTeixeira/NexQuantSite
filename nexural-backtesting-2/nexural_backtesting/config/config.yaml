# Master Configuration File - Enterprise Quantitative Backtesting Engine
# Store all your API keys and settings here

# Environment Configuration
environment:
  name: "development"  # development, staging, production
  debug: false
  log_level: "INFO"
  timezone: "UTC"

# API Keys - PLACEHOLDERS (will be connected later)
api_keys:
  # Data Sources
  databento: "PLACEHOLDER_DATABENTO_KEY"
  polygon: "PLACEHOLDER_POLYGON_KEY"
  alpha_vantage: "PLACEHOLDER_ALPHA_VANTAGE_KEY"
  quandl: "PLACEHOLDER_QUANDL_KEY"
  yahoo_finance: "PLACEHOLDER_YAHOO_KEY"
  
  # Professional Data Sources (for later integration)
  bloomberg: "PLACEHOLDER_BLOOMBERG_KEY"
  refinitiv: "PLACEHOLDER_REFINITIV_KEY"
  ice_data: "PLACEHOLDER_ICE_KEY"
  coinapi: "PLACEHOLDER_COINAPI_KEY"
  
  # Broker APIs (for later integration)
  interactive_brokers: "PLACEHOLDER_IB_KEY"
  alpaca: "PLACEHOLDER_ALPACA_KEY"
  td_ameritrade: "PLACEHOLDER_TD_KEY"
  
  # AI Services
  openai: "PLACEHOLDER_OPENAI_KEY"
  anthropic: "PLACEHOLDER_ANTHROPIC_KEY"
  
  # Cloud Services (for later integration)
  aws_access_key: "PLACEHOLDER_AWS_KEY"
  aws_secret_key: "PLACEHOLDER_AWS_SECRET"
  gcp_credentials: "PLACEHOLDER_GCP_CREDENTIALS"
  azure_credentials: "PLACEHOLDER_AZURE_CREDENTIALS"

# Data Settings
data:
  # Supported Asset Classes
  asset_classes:
    equities: true
    options: true
    futures: true
    forex: true
    crypto: true
    fixed_income: true
    commodities: true
    etfs: true
  
  # Data Sources Configuration
  sources:
    primary: "databento"  # Primary data source
    fallback: "polygon"   # Fallback data source
    alternative: "alpha_vantage"  # Alternative data
    
  # Data Quality Settings
  quality:
    min_data_quality_score: 0.95
    outlier_detection: true
    missing_data_interpolation: true
    data_validation: true
    cross_source_reconciliation: true
  
  # Storage Configuration
  storage:
    database:
      type: "postgresql"
      host: "localhost"
      port: 5432
      database: "nexural_backtesting"
      username: "nexural_user"
      password: "PLACEHOLDER_DB_PASSWORD"
      pool_size: 20
      max_overflow: 30
    
    cache:
      type: "redis"
      host: "localhost"
      port: 6379
      password: "PLACEHOLDER_REDIS_PASSWORD"
      db: 0
    
    timeseries:
      type: "timescaledb"
      compression: true
      retention_days: 2555  # 7 years
    
    file_storage:
      type: "local"  # local, s3, gcs, azure
      path: "./data/storage/"
      compression: "parquet"
  
  # Data Processing
  processing:
    batch_size: 10000
    parallel_workers: 4
    memory_limit_gb: 16
    enable_gpu: false
    enable_distributed: false

# Backtesting Settings
backtest:
  # Core Settings
  initial_capital: 1000000  # $1M starting capital
  position_limit: 100
  commission_per_side: 2.25
  slippage_model: "calibrated"
  
  # Execution Settings
  execution:
    latency_ms: 5
    fill_model: "realistic"
    use_real_fills: true
    partial_fills: true
    failed_trades: true
    order_rejections: true
    
  # Order Types
  order_types:
    market: true
    limit: true
    stop: true
    stop_limit: true
    iceberg: true
    twap: true
    vwap: true
    pegged: true
    
  # Risk Management
  risk:
    max_position_pct: 0.10
    max_daily_loss: 0.02
    max_drawdown: 0.15
    stop_loss_pct: 0.02
    leverage_limit: 2.0
    concentration_limit: 0.05
    correlation_limit: 0.7
    
  # Performance Settings
  performance:
    enable_parallel: true
    max_workers: 8
    memory_optimization: true
    cache_results: true
    enable_profiling: false

# Risk Management System
risk_management:
  # Pre-Trade Risk Checks
  pre_trade:
    position_limits: true
    concentration_limits: true
    leverage_checks: true
    correlation_checks: true
    liquidity_checks: true
    volatility_checks: true
    
  # Real-Time Risk Metrics
  real_time:
    var_calculation: true
    cvar_calculation: true
    stress_testing: true
    sensitivity_analysis: true
    greeks_calculation: true
    
  # Portfolio Risk
  portfolio:
    covariance_estimation: "ewma"
    risk_decomposition: true
    tracking_error: true
    downside_deviation: true
    tail_risk: true
    regime_analysis: true

# Testing Framework
testing:
  # Walk-Forward Analysis
  walk_forward:
    window_months: 12
    step_months: 3
    min_periods: 6
    validation_method: "anchored"
    
  # Monte Carlo Simulation
  monte_carlo:
    simulations: 1000
    confidence_level: 0.95
    seed: 42
    parallel: true
    
  # Stress Testing
  stress_test:
    scenarios:
      - flash_crash
      - volatility_spike
      - liquidity_crisis
      - correlation_breakdown
      - interest_rate_shock
      - currency_crisis
      - commodity_shock
      - geopolitical_event
      
  # Sensitivity Analysis
  sensitivity:
    parameter_ranges: true
    scenario_analysis: true
    stress_scenarios: true

# Machine Learning & AI
ai:
  # Model Configuration
  models:
    openai_model: "gpt-4"
    anthropic_model: "claude-3-opus-20241022"
    max_tokens: 4000
    temperature: 0.7
    
  # Feature Engineering
  features:
    technical_indicators: true
    microstructure_features: true
    sentiment_features: true
    alternative_data: true
    regime_features: true
    
  # Model Training
  training:
    cross_validation: true
    hyperparameter_optimization: true
    ensemble_methods: true
    overfitting_prevention: true
    
  # Model Monitoring
  monitoring:
    model_drift: true
    performance_tracking: true
    bias_detection: true
    explainability: true

# Performance Analytics
analytics:
  # Return Metrics
  returns:
    time_weighted: true
    money_weighted: true
    geometric: true
    arithmetic: true
    rolling_windows: true
    benchmark_relative: true
    
  # Risk Metrics
  risk:
    sharpe_ratio: true
    sortino_ratio: true
    calmar_ratio: true
    sterling_ratio: true
    burke_ratio: true
    omega_ratio: true
    kappa_ratio: true
    
  # Statistical Analysis
  statistics:
    distribution_analysis: true
    autocorrelation: true
    runs_tests: true
    bootstrap: true
    monte_carlo: true
    regime_detection: true
    
  # Trade Analytics
  trades:
    win_rate: true
    profit_factor: true
    average_win_loss: true
    max_adverse_excursion: true
    max_favorable_excursion: true
    trade_duration: true
    entry_exit_efficiency: true
    
  # Attribution Analysis
  attribution:
    brinson_fachler: true
    factor_based: true
    sector_attribution: true
    country_attribution: true
    currency_attribution: true
    trading_cost: true
    timing_selection: true

# System Infrastructure
infrastructure:
  # Computing
  computing:
    distributed: false
    gpu_acceleration: false
    memory_optimization: true
    parallel_processing: true
    
  # Database
  database:
    connection_pooling: true
    query_optimization: true
    indexing: true
    partitioning: true
    
  # Caching
  caching:
    redis: true
    memory_cache: true
    disk_cache: true
    cache_ttl: 3600
    
  # Monitoring
  monitoring:
    prometheus: true
    grafana: true
    jaeger: true
    elk_stack: true
    
  # Security
  security:
    encryption: true
    authentication: true
    authorization: true
    audit_logging: true

# API Configuration (for later integration)
api:
  # REST API
  rest:
    host: "0.0.0.0"
    port: 8000
    workers: 4
    rate_limit: 1000
    cors: true
    
  # WebSocket API
  websocket:
    host: "0.0.0.0"
    port: 8001
    max_connections: 1000
    
  # gRPC API
  grpc:
    host: "0.0.0.0"
    port: 8002
    max_workers: 10
    
  # Message Queue
  message_queue:
    type: "redis"  # redis, rabbitmq, kafka
    host: "localhost"
    port: 6379
    password: "PLACEHOLDER_MQ_PASSWORD"

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - file: "logs/backtest.log"
    - console: true
  rotation:
    max_size: "100MB"
    backup_count: 10
  structured: true

# Development Settings
development:
  debug: false
  profiling: false
  hot_reload: false
  auto_migrate: true
  seed_data: false 