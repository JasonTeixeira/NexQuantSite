# Development Environment Configuration
environment: development
debug: true

# Logging
logging:
  level: DEBUG
  console_output: true
  file_output: true
  json_format: false

# Data Settings
data:
  use_mock_data: true
  cache_enabled: true
  validation_strict: false
  paths:
    databento: "./data/dev/databento/"
    ninjatrader: "./data/dev/ninjatrader/"
    cache: "./data/dev/cache/"
    results: "./data/dev/results/"

# Backtesting Settings  
backtest:
  initial_capital: 50000  # Smaller for dev testing
  position_limit: 2
  commission_per_side: 2.25
  slippage_model: "simple"  # Use simple model for faster testing

# Execution Settings
execution:
  latency_ms: 10  # Higher latency for dev
  fill_model: "simple"
  use_real_fills: false

# Risk Management (Relaxed for testing)
risk:
  max_position_pct: 0.20
  max_daily_loss: 0.05
  max_drawdown: 0.15
  stop_loss_pct: 0.03

# Testing Parameters
testing:
  walk_forward:
    window_months: 6  # Shorter for faster testing
    step_months: 1
  monte_carlo:
    simulations: 100  # Fewer simulations
    confidence_level: 0.95
  stress_test:
    scenarios:
      - flash_crash
      - volatility_spike

# Performance Settings
performance:
  max_workers: 2  # Limit workers for dev
  batch_size: 1000
  enable_parallel: false
  enable_numba: true

# Monitoring
monitoring:
  metrics_collection: true
  collection_interval: 60  # 1 minute
  retention_hours: 4
  alerts_enabled: false

# AI Settings
ai:
  model: "claude-3-haiku-20240307"  # Faster model for dev
  max_tokens: 1000
  temperature: 0.5
  analyze_every_n_trades: 50

# Security (Development - Less strict)
security:
  encryption_enabled: false
  audit_logging: true
  session_timeout_minutes: 120