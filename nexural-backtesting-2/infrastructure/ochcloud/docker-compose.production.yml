# OCHcloud Production Deployment
# Docker Compose configuration for complete Nexural platform deployment
# Zero cloud provider dependencies - runs entirely on OCHcloud infrastructure

version: '3.8'

services:
  # PostgreSQL Primary Database
  postgres-primary:
    image: postgres:15-alpine
    container_name: nexural-postgres-primary
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexural_production}
      POSTGRES_USER: ${POSTGRES_USER:-nexural_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./postgresql/setup-replication.sh:/docker-entrypoint-initdb.d/setup-replication.sh:ro
      - ./postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgresql/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    ports:
      - "5432:5432"
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexural_admin} -d ${POSTGRES_DB:-nexural_production}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Read Replica
  postgres-replica:
    image: postgres:15-alpine
    container_name: nexural-postgres-replica
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexural_production}
      POSTGRES_USER: ${POSTGRES_USER:-nexural_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_REPLICATION_USER:-replicator}
      PGPASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./postgresql/setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh:ro
    ports:
      - "5433:5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # Redis Cluster Master
  redis-master:
    image: redis:7-alpine
    container_name: nexural-redis-master
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_master_data:/data
      - ./redis/redis-master.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Redis Replica
  redis-replica:
    image: redis:7-alpine
    container_name: nexural-redis-replica
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD} --replicaof nexural-redis-master 6379
    volumes:
      - redis_replica_data:/data
      - ./redis/redis-replica.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6380:6379"
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexural-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nexural_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  # Main Application
  nexural-app:
    build:
      context: ../../
      dockerfile: infrastructure/ochcloud/Dockerfile
    container_name: nexural-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexural_admin}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB:-nexural_production}
      DATABASE_READ_URL: postgresql://${POSTGRES_USER:-nexural_admin}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB:-nexural_production}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-master:6379/0
      REDIS_REPLICA_URL: redis://:${REDIS_PASSWORD}@redis-replica:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexural_mq}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET}
      HSM_MASTER_PASSWORD: ${HSM_MASTER_PASSWORD}
      HSM_MASTER_SALT: ${HSM_MASTER_SALT}
      ENCRYPTION_KEY_ROTATION_DAYS: 90
      USE_GPU: ${USE_GPU:-false}
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
      - model_storage:/app/models
    ports:
      - "3000:3000"
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexural-network
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker Service for Background Tasks
  nexural-worker:
    build:
      context: ../../
      dockerfile: infrastructure/ochcloud/Dockerfile.worker
    container_name: nexural-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexural_admin}:${POSTGRES_PASSWORD}@postgres-primary:5432/${POSTGRES_DB:-nexural_production}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-master:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexural_mq}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      HSM_MASTER_PASSWORD: ${HSM_MASTER_PASSWORD}
      HSM_MASTER_SALT: ${HSM_MASTER_SALT}
      USE_GPU: ${USE_GPU:-false}
    volumes:
      - app_logs:/app/logs
      - model_storage:/app/models
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexural-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 6G
          cpus: '3.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # NGINX Load Balancer & Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nexural-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nexural-app
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: nexural-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.route-prefix=/'
      - '--web.enable-admin-api'
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: nexural-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # Node Exporter for System Metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: nexural-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - nexural-network

  # cAdvisor for Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: nexural-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

  # Log Aggregation with Loki
  loki:
    image: grafana/loki:latest
    container_name: nexural-loki
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - nexural-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # Promtail for Log Collection
  promtail:
    image: grafana/promtail:latest
    container_name: nexural-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - app_logs:/var/log/nexural:ro
      - nginx_logs:/var/log/nginx:ro
      - /var/log:/var/log/host:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - nexural-network

volumes:
  postgres_primary_data:
    driver: local
  postgres_replica_data:
    driver: local
  redis_master_data:
    driver: local
  redis_replica_data:
    driver: local
  rabbitmq_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  model_storage:
    driver: local
  nginx_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  nexural-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
