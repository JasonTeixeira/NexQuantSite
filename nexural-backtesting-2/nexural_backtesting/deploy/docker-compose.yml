version: '3.8'

services:
  # Main application
  nexural-backtesting:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: nexural-backtesting
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nexural:password@postgres:5432/nexural_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - ENVIRONMENT=production
    depends_on:
      - postgres
      - redis
    volumes:
      - ../logs:/app/logs
      - ../data:/app/data
    restart: unless-stopped
    networks:
      - nexural-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nexural-postgres
    environment:
      - POSTGRES_DB=nexural_db
      - POSTGRES_USER=nexural
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - nexural-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexural-redis
    command: redis-server --appendonly yes --requirepass redispassword
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - nexural-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: nexural-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - nexural-backtesting
    restart: unless-stopped
    networks:
      - nexural-network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: nexural-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - nexural-network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: nexural-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - nexural-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  nexural-network:
    driver: bridge

