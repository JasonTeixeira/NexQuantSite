# 🚀 KUBERNETES PRODUCTION DEPLOYMENT - Load balancing and auto-scaling
# Addresses CRITICAL scalability gap: Single instances, no load balancing

apiVersion: v1
kind: Namespace
metadata:
  name: nexural-production
  labels:
    name: nexural-production
    environment: production

---
# 🗄️ DATABASE CONFIGURATION
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexural-config
  namespace: nexural-production
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30000"
  RATE_LIMIT_ENABLED: "true"
  HSM_PROVIDER: "aws-kms"
  REDIS_CLUSTER_ENABLED: "true"

---
# 🔐 SECRETS (Replace with actual values)
apiVersion: v1
kind: Secret
metadata:
  name: nexural-secrets
  namespace: nexural-production
type: Opaque
stringData:
  DATABASE_URL: "postgresql://username:password@postgres-cluster:5432/nexural_prod"
  REDIS_URL: "redis://redis-cluster:6379"
  JWT_SECRET: "your-super-secure-jwt-secret-here"
  AWS_KMS_KEY_ID: "your-aws-kms-key-id"
  AWS_ACCESS_KEY_ID: "your-aws-access-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
  PROMETHEUS_ENDPOINT: "http://prometheus:9090"

---
# 🌐 FRONTEND DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexural-frontend
  namespace: nexural-production
  labels:
    app: nexural-frontend
    tier: presentation
spec:
  replicas: 3  # Start with 3 replicas, HPA will scale as needed
  selector:
    matchLabels:
      app: nexural-frontend
  template:
    metadata:
      labels:
        app: nexural-frontend
        tier: presentation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
      - name: frontend
        image: nexural/frontend:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 3000
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: nexural-config
              key: NODE_ENV
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexural-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: nexural-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: nexural-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

---
# ⚙️ BACKEND API DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexural-api
  namespace: nexural-production
  labels:
    app: nexural-api
    tier: backend
spec:
  replicas: 4  # More API instances for high load
  selector:
    matchLabels:
      app: nexural-api
  template:
    metadata:
      labels:
        app: nexural-api
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        image: nexural/api:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: nexural-config
              key: NODE_ENV
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexural-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: nexural-secrets
              key: REDIS_URL
        - name: AWS_KMS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: nexural-secrets
              key: AWS_KMS_KEY_ID
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5

---
# 🔌 WEBSOCKET SERVICE DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexural-websocket
  namespace: nexural-production
  labels:
    app: nexural-websocket
    tier: realtime
spec:
  replicas: 2  # Fewer WebSocket instances but sticky sessions
  selector:
    matchLabels:
      app: nexural-websocket
  template:
    metadata:
      labels:
        app: nexural-websocket
        tier: realtime
    spec:
      containers:
      - name: websocket
        image: nexural/websocket:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8081
          protocol: TCP
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: nexural-secrets
              key: REDIS_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

---
# 🌐 FRONTEND SERVICE
apiVersion: v1
kind: Service
metadata:
  name: nexural-frontend-service
  namespace: nexural-production
  labels:
    app: nexural-frontend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: nexural-frontend

---
# ⚙️ API SERVICE
apiVersion: v1
kind: Service
metadata:
  name: nexural-api-service
  namespace: nexural-production
  labels:
    app: nexural-api
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: nexural-api

---
# 🔌 WEBSOCKET SERVICE
apiVersion: v1
kind: Service
metadata:
  name: nexural-websocket-service
  namespace: nexural-production
  labels:
    app: nexural-websocket
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: tcp
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "300"
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: websocket
  selector:
    app: nexural-websocket
  sessionAffinity: ClientIP  # Sticky sessions for WebSocket

---
# 🚪 INGRESS CONTROLLER
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexural-ingress
  namespace: nexural-production
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  tls:
  - hosts:
    - nexural.com
    - api.nexural.com
    - ws.nexural.com
    secretName: nexural-tls
  rules:
  - host: nexural.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexural-frontend-service
            port:
              number: 3000
  - host: api.nexural.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexural-api-service
            port:
              number: 8080
  - host: ws.nexural.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexural-websocket-service
            port:
              number: 8081

---
# 📈 HORIZONTAL POD AUTOSCALER - FRONTEND
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexural-frontend-hpa
  namespace: nexural-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexural-frontend
  minReplicas: 3
  maxReplicas: 20  # Scale up to 20 pods under high load
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
# 📈 HORIZONTAL POD AUTOSCALER - API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexural-api-hpa
  namespace: nexural-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexural-api
  minReplicas: 4
  maxReplicas: 30  # API needs more scaling capacity
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 180
      policies:
      - type: Percent
        value: 200
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60

---
# 🔒 NETWORK POLICY
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexural-network-policy
  namespace: nexural-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
  - from:
    - podSelector:
        matchLabels:
          app: nexural-frontend
    - podSelector:
        matchLabels:
          app: nexural-api
    - podSelector:
        matchLabels:
          app: nexural-websocket
  egress:
  - {}  # Allow all egress (for external APIs)

---
# 📊 SERVICE MONITOR (Prometheus)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nexural-frontend
  namespace: nexural-production
  labels:
    app: nexural-frontend
spec:
  selector:
    matchLabels:
      app: nexural-frontend
  endpoints:
  - port: http
    path: /api/metrics
    interval: 30s

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nexural-api
  namespace: nexural-production
  labels:
    app: nexural-api
spec:
  selector:
    matchLabels:
      app: nexural-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s

---
# 🚨 POD DISRUPTION BUDGET
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexural-frontend-pdb
  namespace: nexural-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: nexural-frontend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexural-api-pdb
  namespace: nexural-production
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: nexural-api

---
# 📊 PROMETHEUS ALERTING RULES
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nexural-alerts
  namespace: nexural-production
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
  - name: nexural.rules
    rules:
    - alert: NexuralHighErrorRate
      expr: rate(nexural_http_requests_total{status_code=~"5.."}[5m]) > 0.1
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "High error rate detected"
        description: "Error rate is {{ $value }} for the last 5 minutes"
        
    - alert: NexuralHighLatency
      expr: histogram_quantile(0.95, rate(nexural_http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High latency detected"
        description: "95th percentile latency is {{ $value }}s"
        
    - alert: NexuralLowHealthScore
      expr: nexural_system_health_score < 80
      for: 3m
      labels:
        severity: warning
      annotations:
        summary: "System health degraded"
        description: "System health score is {{ $value }}%"
        
    - alert: NexuralPodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total{namespace="nexural-production"}[5m]) > 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Pod crash looping"
        description: "Pod {{ $labels.pod }} is crash looping"
