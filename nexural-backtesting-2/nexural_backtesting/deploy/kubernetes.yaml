# Nexural Backtesting - Kubernetes Deployment
# Production-ready Kubernetes manifests

apiVersion: v1
kind: Namespace
metadata:
  name: nexural-backtesting

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexural-config
  namespace: nexural-backtesting
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  DATABASE_URL: "postgresql://nexural:nexural_pass@postgres:5432/nexural_db"
  REDIS_URL: "redis://redis:6379/0"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: nexural-secrets
  namespace: nexural-backtesting
type: Opaque
data:
  # Base64 encoded secrets
  jwt-secret: bmV4dXJhbC1qd3Qtc2VjcmV0LWtleQ==  # nexural-jwt-secret-key
  postgres-password: bmV4dXJhbF9wYXNz  # nexural_pass

---
# Deployment for main application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexural-api
  namespace: nexural-backtesting
  labels:
    app: nexural-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexural-api
  template:
    metadata:
      labels:
        app: nexural-api
    spec:
      containers:
      - name: nexural-api
        image: nexural-backtesting:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: nexural-config
              key: ENVIRONMENT
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: nexural-config
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: nexural-config
              key: REDIS_URL
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: nexural-secrets
              key: jwt-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: data
          mountPath: /app/data
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: nexural-logs-pvc
      - name: data
        persistentVolumeClaim:
          claimName: nexural-data-pvc

---
# Service for API
apiVersion: v1
kind: Service
metadata:
  name: nexural-api-service
  namespace: nexural-backtesting
spec:
  selector:
    app: nexural-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexural-api-hpa
  namespace: nexural-backtesting
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexural-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: nexural-backtesting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: "nexural_db"
        - name: POSTGRES_USER
          value: "nexural"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexural-secrets
              key: postgres-password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nexural-backtesting
spec:
  selector:
    app: postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nexural-backtesting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nexural-backtesting
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379

---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexural-logs-pvc
  namespace: nexural-backtesting
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexural-data-pvc
  namespace: nexural-backtesting
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: nexural-backtesting
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexural-ingress
  namespace: nexural-backtesting
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - api.nexural-backtesting.com
    secretName: nexural-tls
  rules:
  - host: api.nexural-backtesting.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexural-api-service
            port:
              number: 80





